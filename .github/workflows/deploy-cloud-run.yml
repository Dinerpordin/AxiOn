name: Build & Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches:
      - main

env:
  PROJECT_ID: axion-11-plus
  REGION: europe-west1
  SERVICE: axion
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: axion-repo

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

    - name: Ensure Artifact Registry repo exists
      run: |
        gcloud artifacts repositories describe ${{ env.REPO }} \
          --location=${{ env.REGION }} \
          --project=${{ env.PROJECT_ID }} 2>/dev/null || \
        gcloud artifacts repositories create ${{ env.REPO }} \
          --repository-format=docker \
          --location=${{ env.REGION }} \
          --project=${{ env.PROJECT_ID }}

    - name: Build and push Docker image
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
        docker build -t $IMAGE .
        docker push $IMAGE

    - name: Deploy to Cloud Run
      run: |
        IMAGE=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
        gcloud run deploy ${{ env.SERVICE }} \
          --image=$IMAGE \
          --project=${{ env.PROJECT_ID }} \
          --region=${{ env.REGION }} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080
